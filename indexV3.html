<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Datos Personales</title>
    <link rel="stylesheet" href="styleV3.css">
</head>

<body>
    <div class="formulario" id="mainformulario">
        <h2>FormularioV1</h2>
        
        <form id="personalForm">
            <div class="field">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required minlength="2" maxlength="35">
            </div>

            <div class="field">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required minlength="2" maxlength="25">
            </div>

            <div class="field">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="field">
                <label for="fecha_nac">Fecha de Nacimiento:</label>
                <input type="date" id="fecha_nac" name="fecha_nac" required min="1920-01-01" max="2025-12-31">
            </div>

            <div class="field">
                <label for="pais">Pais de Residencia:</label>
                <select id="pais" name="pais" required>
                    <option value="">Seleccione un pais...</option>
                    <option value="AR">Argentina</option>
                    <option value="Brasil">Brasil</option>
                    <option value="UR">Uruguay</option>
                    <option value="CH">Chile</option>
                    <option value="OT">Otro</option>
                </select>
            </div>

            <div class="botones">
                <button type="submit" class="enviar">Enviar</button>
                <div class="selector-contraste">
                    <button type="button" class="normal" id="estilo_normal">Estilo Normal</button>
                    <button type="button" class="contraste" id="estilo_contraste">Estilo Alto Contraste</button>
                </div>
            </div>
        </form>
    </div>
</body>
